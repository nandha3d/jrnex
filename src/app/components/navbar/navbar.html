<nav class="navbar">
    <div class="container navbar-container">
        <a routerLink="/" class="logo">
            <div class="logo-container">
                <img src="assets/Logo.avif" alt="JRNEX Logo" class="nav-logo" width="184" height="48">
            </div>
        </a>

        <ul class="nav-links">
            <li><a routerLink="/about" routerLinkActive="active">ABOUT US</a></li>
            <li class="dropdown">
                <a routerLink="." (click)="$event.preventDefault()">SERVICES</a>
                <ul class="dropdown-menu">
                    <li *ngFor="let service of services">
                        <a [routerLink]="service.link" routerLinkActive="active">{{ service.name }}</a>
                    </li>
                </ul>
            </li>
            <!-- RPTO menu hidden -->
            <li><a routerLink="/education" routerLinkActive="active">DRONE EDUCATION</a></li>
            <li><a routerLink="/steam-education" routerLinkActive="active">STEM EDUCATION</a></li>
            <li><a routerLink="/contact" routerLinkActive="active">CONTACT US</a></li>
        </ul>

        <!-- Register & Login hidden -->

        <button class="mobile-menu-toggle" aria-label="Toggle mobile menu" (click)="isMobileMenuOpen = !isMobileMenuOpen">
            <span></span><span></span><span></span>
        </button>
    </div>

    <!-- Mobile Menu -->
    <div class="mobile-menu" *ngIf="isMobileMenuOpen">
        <ul>
            <li><a routerLink="/about" (click)="isMobileMenuOpen = false">ABOUT US</a></li>
            <li *ngFor="let service of services">
                <a [routerLink]="service.link" (click)="isMobileMenuOpen = false">{{ service.name }}</a>
            </li>
            <!-- RPTO menu hidden -->
            <li><a routerLink="/education" (click)="isMobileMenuOpen = false">DRONE EDUCATION</a></li>
            <li><a routerLink="/steam-education" (click)="isMobileMenuOpen = false">STEM EDUCATION</a></li>
            <li><a routerLink="/contact" (click)="isMobileMenuOpen = false">CONTACT US</a></li>
        </ul>
    </div>
</nav>
